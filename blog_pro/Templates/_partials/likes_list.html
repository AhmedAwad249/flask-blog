<div class="likes-list">
    <h4>❤️ Liked by:</h4>
    <ul>
        {% for user in post.likes %}
            <li>
                <img src="{{ user.image_file }}" class="like-avatar">
                <a href="/">{{ user.username }}</a>
            </li>
        {% else %}
            <li>No likes yet.</li>
        {% endfor %}
    </ul>
</div>
