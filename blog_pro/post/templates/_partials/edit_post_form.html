<form 
    hx-post="{{ url_for('post.update_post', post_id=post.id) }}"
    hx-target="#post-{{ post.id }}"
    hx-swap="outerHTML"
    id="post-{{ post.id }}"
    class="post-card"
>
    <input type="text" name="title" value="{{ post.title }}" class="form-input" required>
    <textarea name="content" rows="3" class="form-input" required>{{ post.content }}</textarea>
    <div class="actions">
        <button type="submit" class="btn" style="background-color: green;">Save</button>
        <button 
            type="button" 
            class="btn" 
            style="background-color: gray;"
            hx-get="{{ url_for('post.cancel_edit_post', post_id=post.id) }}"
            hx-target="#post-{{ post.id }}"
            hx-swap="outerHTML"
        >Cancel</button>
    </div>
</form>
